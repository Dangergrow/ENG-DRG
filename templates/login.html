<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaMate — Вход</title>
    <link rel="stylesheet" href="/static/css/design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-wrap">
    <div class="login-box">
        <div class="login-logo">Lingua<span>Mate</span></div>
        <div class="login-sub">Твой персональный ИИ-учитель английского</div>

        {% if users %}
        <div class="section-label">Выбери профиль</div>
        {% for u in users %}
        <div class="user-card" onclick="loginUser({{ u.id }})">
            <div class="user-avatar">{{ u.name[0]|upper }}</div>
            <div style="flex:1"><div style="font-weight:600;font-size:15px">{{ u.name }}</div>
                <div style="font-size:12px;color:var(--t2)">{{ u.level }} · {{ u.xp }} XP · 🔥 {{ u.streak }}</div></div>
            <div style="color:var(--t3)">→</div>
        </div>
        {% endfor %}
        {% endif %}

        <div class="section-label">{{ 'или создай новый' if users else 'Создай профиль' }}</div>
        <div style="display:flex;gap:8px">
            <input type="text" id="login-name" placeholder="Твоё имя..."
                style="flex:1;background:var(--s2);border:1px solid var(--s3);color:var(--t1);padding:12px 16px;border-radius:var(--radius-sm);font-family:inherit;font-size:15px;outline:none"
                onkeydown="if(event.key==='Enter')doRegister()">
            <button onclick="doRegister()" class="btn btn-accent" style="padding:12px 24px">Войти</button>
        </div>
        <div id="login-error" style="color:var(--danger);font-size:12px;margin-top:8px;display:none"></div>

        <div class="section-label" style="margin-top:28px">🔑 API-ключ</div>
        <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
            <button onclick="setProvider('openrouter')" class="btn btn-ghost btn-sm" style="font-size:10px">OpenRouter</button>
            <button onclick="setProvider('openai')" class="btn btn-ghost btn-sm" style="font-size:10px">OpenAI</button>
            <button onclick="setProvider('deepseek')" class="btn btn-ghost btn-sm" style="font-size:10px">DeepSeek</button>
            <button onclick="setProvider('gigachat')" class="btn btn-ghost btn-sm" style="font-size:10px">GigaChat</button>
            <button onclick="setProvider('groq')" class="btn btn-ghost btn-sm" style="font-size:10px">Groq</button>
            <button onclick="setProvider('together')" class="btn btn-ghost btn-sm" style="font-size:10px">Together</button>
            <button onclick="setProvider('mistral')" class="btn btn-ghost btn-sm" style="font-size:10px">Mistral</button>
            <button onclick="setProvider('perplexity')" class="btn btn-ghost btn-sm" style="font-size:10px">Perplexity</button>
            <button onclick="setProvider('fireworks')" class="btn btn-ghost btn-sm" style="font-size:10px">Fireworks</button>
            <button onclick="setProvider('custom')" class="btn btn-ghost btn-sm" style="font-size:10px">Свой</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:4px">
            <input type="text" id="api-key" placeholder="Ключ API..."
                style="flex:1;background:var(--s2);border:1px solid var(--s3);color:var(--t1);padding:10px 14px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;outline:none">
            <button onclick="saveKey()" class="btn btn-ghost btn-sm" style="white-space:nowrap">💾</button>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:4px">
            <input type="text" id="api-url" placeholder="URL API..."
                style="flex:2;background:var(--s2);border:1px solid var(--s3);color:var(--t1);padding:8px 12px;border-radius:var(--radius-sm);font-family:inherit;font-size:11px;outline:none">
            <input type="text" id="api-model" placeholder="Модель..."
                style="flex:1;background:var(--s2);border:1px solid var(--s3);color:var(--t1);padding:8px 12px;border-radius:var(--radius-sm);font-family:inherit;font-size:11px;outline:none">
        </div>
        <div id="key-saved" style="color:var(--success);font-size:11px;margin-top:4px;display:none"></div>
    </div>
</div>

<script>
async function loginUser(uid) {
    await fetch('/api/switch_user', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid})});
    window.location.href = '/';
}
async function doRegister() {
    const name = document.getElementById('login-name').value.trim();
    if (!name || name.length < 2) { showErr('Имя должно быть не короче 2 символов'); return; }
    let r = await fetch('/api/register', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
    if (r.ok) { window.location.href = '/'; return; }
    let d = await r.json();
    if (d.error && d.error.includes('уже есть')) {
        r = await fetch('/api/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
        if (r.ok) { window.location.href = '/'; return; }
    }
    showErr(d.error || 'Ошибка');
}
function showErr(msg) { const e = document.getElementById('login-error'); e.textContent = msg; e.style.display = 'block'; }

// Загрузить сохранённые настройки
fetch('/api/get_key').then(r=>r.json()).then(d=>{
    document.getElementById('api-key').value = d.apikey || '';
    document.getElementById('api-url').value = d.base_url || '';
    document.getElementById('api-model').value = d.model || '';
});

async function saveKey() {
    const key = document.getElementById('api-key').value.trim();
    const base_url = document.getElementById('api-url').value.trim();
    const model = document.getElementById('api-model').value.trim();
    if (!key) return;
    const el = document.getElementById('key-saved');
    el.textContent = '⏳ Проверяю ключ...'; el.style.display = 'block'; el.style.color = 'var(--t2)';
    const r = await fetch('/api/save_key', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key, base_url, model})});
    const d = await r.json();
    if (d.ok) { el.textContent = '✅ Ключ работает и сохранён'; el.style.color = 'var(--success)'; }
    else { el.textContent = '❌ ' + (d.error || 'Ошибка'); el.style.color = 'var(--danger)'; }
    el.style.display = 'block';
    setTimeout(()=>el.style.display='none',5000);
}

function setProvider(p) {
    const presets = {
        openrouter: {url:'https://openrouter.ai/api/v1', model:'openai/gpt-oss-120b:free'},
        openai: {url:'https://api.openai.com/v1', model:'gpt-4o-mini'},
        deepseek: {url:'https://api.deepseek.com', model:'deepseek-chat'},
        groq: {url:'https://api.groq.com/openai/v1', model:'llama-3.3-70b-versatile'},
        together: {url:'https://api.together.xyz/v1', model:'meta-llama/Llama-3.3-70B-Instruct-Turbo'},
        gigachat: {url:'https://gigachat.devices.sberbank.ru/api/v1', model:'GigaChat'},
        mistral: {url:'https://api.mistral.ai/v1', model:'mistral-small-latest'},
        perplexity: {url:'https://api.perplexity.ai', model:'sonar-pro'},
        fireworks: {url:'https://api.fireworks.ai/inference/v1', model:'accounts/fireworks/models/llama-v3p1-70b-instruct'},
        custom: {url:'', model:''}
    };
    const pr = presets[p];
    document.getElementById('api-url').value = pr.url;
    document.getElementById('api-model').value = pr.model;
    if (p === 'custom') { document.getElementById('api-url').focus(); }
}
</script>
</body>
</html>
